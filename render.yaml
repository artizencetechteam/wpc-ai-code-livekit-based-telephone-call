services:
  # 1. FastAPI Backend + LiveKit Agent Worker
  - type: web
    name: vocal-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "bash start.sh"
    envVars:
      - key: LIVEKIT_URL
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: ELEVEN_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false

  # 2. React Frontend
  - type: web
    name: vocal-frontend
    env: static
    buildCommand: "yarn install && yarn build"
    staticPublishPath: "./dist"
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: vocal-backend
          property: host
