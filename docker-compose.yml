services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4041:5000"
    command: >
      sh -c "uv run agent_worker.py start & uv run uvicorn main:app --host 0.0.0.0 --port 5000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: http://localhost:5000
    ports:
      - "4040:4040"
    depends_on:
      - backend
